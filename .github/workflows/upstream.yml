name: 🔄 Upstream Google ACK (Merge)

on:
  workflow_dispatch:

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешаем боту пушить код в твое репо
    steps:
      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone OnePlus Base Kernel (OP13 Branch)
        run: |
          echo "Скачиваем базу cctv18 (Ветка: oneplus_13_6.6.89)..."
          # Используем git clone с флагом -b для скачивания конкретной ветки вместе с папкой .git
          git clone -b oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89 https://github.com/cctv18/android_kernel_common_oneplus_sm8750.git kernel_workspace
          cd kernel_workspace
          
          # Подключаем твой текущий репозиторий как основной (origin)
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # Заливаем оригинальную базу в твою ветку main, чтобы было от чего отталкиваться
          git push -u origin HEAD:main || echo "Ветка main уже существует"

      - name: Fetch Google ACK (android15-6.6)
        run: |
          cd kernel_workspace
          echo "Подключаем репозиторий Google..."
          git remote add google https://android.googlesource.com/kernel/common
          
          echo "Скачиваем свежие обновления Google..."
          git fetch google android15-6.6

      - name: Merge & Push
        run: |
          cd kernel_workspace
          
          # Создаем новую ветку для апдейта
          git checkout -b upstream-update
          
          echo "Начинаем слияние (Merge)..."
          # Пытаемся слить. Если будут конфликты, команда вернет ошибку, но мы перехватим ее через if
          if git merge FETCH_HEAD --no-edit; then
            echo "✅ Слияние прошло без конфликтов!"
            git push -f -u origin upstream-update
          else
            echo "⚠️ Обнаружены конфликты слияния! Сохраняем маркеры конфликтов..."
            
            # Добавляем все файлы с маркерами <<<<<<< в индекс
            git add .
            
            # Делаем коммит (игнорируя ошибку нерешенных конфликтов)
            git commit -m "⚠️ CONFLICTS: Merge upstream android15-6.6 (Needs Manual Fix)" || true
            
            # Отправляем конфликтную ветку в твой репозиторий
            git push -f -u origin upstream-update
            
            echo "::error::Слияние завершено с конфликтами. Перейдите в ветку 'upstream-update', нажмите клавишу '.' (точка) на клавиатуре для открытия Web VS Code и решите конфликты."
          fi
