name: Backport OEM Patches onto Google GKI

on:
  workflow_dispatch:
    inputs:
      google_new_branch:
        description: 'Target Google GKI branch (fresh)'
        default: 'android15-6.6'
        required: true
      google_base_tag:
        description: 'Google ACK tag matching cctv18 base (6.6.89)'
        default: 'android15-6.6'
        required: true
      cctv18_branch:
        description: 'cctv18 OEM branch'
        default: 'oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89'
        required: true
      target_branch:
        description: 'Output branch in this repo'
        default: 'backport/android15-6.6-oplus'
        required: true
      dry_run:
        description: 'Dry run (no push)'
        type: boolean
        default: false

jobs:
  backport:
    name: Generate OEM patch and apply onto fresh GKI
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Configure git
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global advice.detachedHead false

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: scripts_repo
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 1: clone cctv18 (OEM kernel, based on 6.6.89) ──────────────
      - name: Clone cctv18 OEM source
        run: |
          git clone --depth=1 \
            -b "${{ inputs.cctv18_branch }}" \
            https://github.com/cctv18/android_kernel_common_oneplus_sm8750 \
            cctv18_src
          echo "CCTV18_SHA=$(git -C cctv18_src rev-parse --short HEAD)" >> $GITHUB_ENV

      # ── Step 2: get the Google ACK commit that cctv18 forked from ────────
      # cctv18 forked from Google ACK at 6.6.89 — find that exact commit
      - name: Find cctv18 fork point in Google ACK
        run: |
          # Fetch full google ACK history (no depth limit — needed for fork-point)
          git clone --filter=blob:none --no-checkout \
            -b "${{ inputs.google_new_branch }}" \
            https://android.googlesource.com/kernel/common \
            google_src

          cd google_src

          # Find the commit tagged or matching 6.6.89 in Google ACK
          FORK_SHA=$(git log --oneline --format="%H %s" | \
            grep -m1 "6\.6\.89\|v6\.6\.89" | awk '{print $1}' || true)

          if [[ -z "$FORK_SHA" ]]; then
            echo "Could not find 6.6.89 tag by commit message, using HEAD~0 as fallback"
            FORK_SHA=$(git rev-parse HEAD)
          fi

          echo "GOOGLE_FORK_SHA=$FORK_SHA" >> $GITHUB_ENV
          echo "Fork point SHA: $FORK_SHA"
          git log -1 --oneline "$FORK_SHA" || true

      # ── Step 3: generate OEM patch (cctv18 vs google fork point) ─────────
      - name: Generate OEM patch
        run: |
          cd google_src
          git checkout "${{ env.GOOGLE_FORK_SHA }}"
          cd ..

          echo "Generating diff: google@6.6.89 → cctv18 ..."
          git diff \
            --no-index \
            --binary \
            google_src/ cctv18_src/ > oem_overlay.patch || true
          # git diff --no-index returns exit 1 when files differ — that's normal

          PATCH_SIZE=$(wc -c < oem_overlay.patch)
          PATCH_LINES=$(wc -l < oem_overlay.patch)
          echo "Patch size: $PATCH_SIZE bytes, $PATCH_LINES lines"

          if [[ "$PATCH_SIZE" -lt 1000 ]]; then
            echo "ERROR: patch is suspiciously small — something went wrong"
            exit 1
          fi

      # ── Step 4: prepare fresh Google GKI tree ────────────────────────────
      - name: Checkout fresh Google GKI HEAD
        run: |
          cd google_src
          git checkout "${{ inputs.google_new_branch }}" 2>/dev/null || \
            git checkout "origin/${{ inputs.google_new_branch }}"
          echo "GOOGLE_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          git log -1 --oneline

      - name: Copy fresh GKI as merge target
        run: |
          cp -a google_src merged
          cd merged
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b "${{ inputs.target_branch }}"

      # ── Step 5: apply OEM patch with 3-way merge ─────────────────────────
      - name: Apply OEM patch (3-way)
        run: |
          # Fix patch paths: git diff --no-index produces a/ b/ prefixes with full paths
          # Need to strip the google_src/ and cctv18_src/ prefixes
          sed -i \
            -e 's|^--- a/google_src/|--- a/|g' \
            -e 's|^+++ b/cctv18_src/|+++ b/|g' \
            oem_overlay.patch

          cd merged

          echo "Applying OEM patch with --3way ..."
          git apply --3way --whitespace=nowarn ../oem_overlay.patch 2>&1 | tee /tmp/apply_log.txt || true

          # Count rejects
          REJECTS=$(find . -name "*.rej" | wc -l)
          echo "REJECT_COUNT=$REJECTS" >> $GITHUB_ENV
          echo "Rejected hunks: $REJECTS"

          if [[ "$REJECTS" -gt 0 ]]; then
            echo "=== Rejected files ==="
            find . -name "*.rej" | head -50
          fi

      # ── Step 6: commit result ─────────────────────────────────────────────
      - name: Commit backport result
        run: |
          cd merged
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "backport: apply OEM patches from cctv18 onto Google GKI android15-6.6"

      # ── Step 7: push ───────────────────────────────────────────────────────
      - name: Push to target branch
        if: inputs.dry_run != 'true'
        run: |
          cd merged
          git push -u origin "${{ inputs.target_branch }}" --force
          echo "Pushed to ${{ inputs.target_branch }}"

      # ── Step 8: upload artifacts ──────────────────────────────────────────
      - name: Upload patch file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oem-overlay-patch
          path: oem_overlay.patch
          retention-days: 7

      - name: Upload reject files (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-rejects
          path: merged/**/*.rej
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "=== Backport Summary ==="
          echo "Google base (fork point): ${{ env.GOOGLE_FORK_SHA }}"
          echo "Google HEAD:              ${{ env.GOOGLE_SHA }}"
          echo "cctv18 SHA:               ${{ env.CCTV18_SHA }}"
          echo "Rejected hunks:           ${{ env.REJECT_COUNT }}"
          echo ""
          if [[ "${{ env.REJECT_COUNT }}" -gt 0 ]]; then
            echo "ACTION REQUIRED: Download 'patch-rejects' artifact and resolve .rej files manually."
            echo "These are files where Google changed the same code that OnePlus patched."
          else
            echo "Clean apply — no manual intervention needed."
          fi
