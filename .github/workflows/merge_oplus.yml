name: Backport OEM Patches onto Google GKI

on:
  workflow_dispatch:
    inputs:
      google_branch:
        description: 'Google GKI branch'
        default: 'android15-6.6'
        required: true
      cctv18_branch:
        description: 'cctv18 OEM branch'
        default: 'oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89'
        required: true
      target_branch:
        description: 'Output branch in this repo'
        default: 'backport/android15-6.6-oplus'
        required: true
      dry_run:
        description: 'Dry run (no push)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backport:
    name: Backport OEM patches onto fresh GKI
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Configure git
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global advice.detachedHead false

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Google GKI
        run: |
          # depth=200 to find the 6.6.89 tag which is a few commits back from HEAD
          git clone --depth=200 \
            -b "${{ inputs.google_branch }}" \
            https://android.googlesource.com/kernel/common \
            google_src
          echo "GOOGLE_SHA=$(git -C google_src rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Clone cctv18
        run: |
          git clone --depth=1 \
            -b "${{ inputs.cctv18_branch }}" \
            https://github.com/cctv18/android_kernel_common_oneplus_sm8750 \
            cctv18_src
          echo "CCTV18_SHA=$(git -C cctv18_src rev-parse --short HEAD)" >> $GITHUB_ENV

            - name: Find fork point (6.6.89 tag in Google history)
        run: |
          cd google_src
          # The known fork point from previous run logs
          KNOWN_SHA="9f62a273a8443aa2d97898c5c473974ec3ea77d1"

          # Try to find it in our shallow clone
          if git cat-file -e "$KNOWN_SHA" 2>/dev/null; then
            FORK_SHA="$KNOWN_SHA"
            echo "Found known fork point: $FORK_SHA"
          else
            # Search by tag message in shallow log
            FORK_SHA=$(git log --format="%H %s" | grep -m1 "6\.6\.89" | awk '{print $1}' || true)
            if [[ -n "$FORK_SHA" ]]; then
              echo "Found via grep: $FORK_SHA"
            fi
          fi

          if [[ -z "$FORK_SHA" ]]; then
            echo "ERROR: Could not find 6.6.89 fork point"
            exit 1
          fi

          echo "FORK_SHA=$FORK_SHA" >> $GITHUB_ENV
          git log -1 --oneline "$FORK_SHA"


      - name: Checkout Google at fork point
        run: |
          cd google_src
          git checkout "${{ env.FORK_SHA }}"

      - name: Generate OEM patches (per subtree)
        run: |
          GOOGLE="$(pwd)/google_src"
          CCTV18="$(pwd)/cctv18_src"
          RUNNER_WORKDIR="$(pwd)"
          mkdir -p patches

          SUBTREES=(arch block crypto drivers fs include init ipc kernel lib mm net scripts security sound tools virt)

          for tree in "${SUBTREES[@]}"; do
            if [[ -d "$CCTV18/$tree" ]]; then
              echo "Diffing $tree/ ..."
              git diff --no-index --binary \
                "$GOOGLE/$tree" "$CCTV18/$tree" \
                > "patches/${tree}.patch" 2>/dev/null || true

              # Fix paths: replace absolute paths with relative
              # Handle both regular files and /dev/null (new/deleted files)
              python3 - "$RUNNER_WORKDIR" "patches/${tree}.patch" << 'PYEOF'
          import sys, re

          workdir = sys.argv[1]
          patch_file = sys.argv[2]

          with open(patch_file, 'r', errors='replace') as f:
              content = f.read()

          # Strip workdir-based absolute paths from --- and +++ lines
          # git diff --no-index uses full paths like:
          #   --- a/home/runner/work/.../google_src/drivers/foo.c
          #   +++ b/home/runner/work/.../cctv18_src/drivers/foo.c
          content = re.sub(r'--- a/.+?/google_src/', '--- a/', content)
          content = re.sub(r'\+\+\+ b/.+?/cctv18_src/', '+++ b/', content)
          # Also handle the reverse (deleted files show cctv18 as ---)
          content = re.sub(r'--- a/.+?/cctv18_src/', '--- a/', content)
          content = re.sub(r'\+\+\+ b/.+?/google_src/', '+++ b/', content)

          with open(patch_file, 'w') as f:
              f.write(content)
          print(f"  Fixed paths in {patch_file}")
          PYEOF

              SIZE=$(wc -c < "patches/${tree}.patch")
              echo "  $tree: $SIZE bytes"
            fi
          done

          # Root files
          for f in Makefile Kconfig MAINTAINERS; do
            if [[ -f "$CCTV18/$f" ]]; then
              git diff --no-index --binary \
                "$GOOGLE/$f" "$CCTV18/$f" \
                >> "patches/root.patch" 2>/dev/null || true
            fi
          done

          python3 - "$(pwd)" "patches/root.patch" << 'PYEOF'
          import sys, re
          workdir = sys.argv[1]
          patch_file = sys.argv[2]
          try:
              with open(patch_file, 'r', errors='replace') as f:
                  content = f.read()
              content = re.sub(r'--- a/.+?/google_src/', '--- a/', content)
              content = re.sub(r'\+\+\+ b/.+?/cctv18_src/', '+++ b/', content)
              with open(patch_file, 'w') as f:
                  f.write(content)
          except FileNotFoundError:
              pass
          PYEOF

          echo "Total patches:"
          ls -lh patches/

      - name: Prepare target tree (fresh Google HEAD)
        run: |
          cd google_src
          git fetch --depth=1 origin ${{ inputs.google_branch }}
          git checkout origin/${{ inputs.google_branch }}
          cd ..
          cp -a google_src merged
          cd merged
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b "${{ inputs.target_branch }}"

      - name: Apply patches subtree by subtree
        run: |
          cd merged
          TOTAL_REJECTS=0

          for patch in ../patches/*.patch; do
            [[ -s "$patch" ]] || continue
            name=$(basename "$patch")
            echo "Applying $name ..."
            git apply \
              --reject \
              --ignore-whitespace \
              --ignore-space-change \
              "$patch" 2>&1 | grep -v "^Checking\|^Applied" | head -5 || true
            TOTAL_REJECTS=$(find . -name "*.rej" | wc -l)
            echo "  rejects so far: $TOTAL_REJECTS"
          done

          echo "REJECT_COUNT=$TOTAL_REJECTS" >> $GITHUB_ENV
          if [[ "$TOTAL_REJECTS" -gt 0 ]]; then
            echo "=== Rejected files ==="
            find . -name "*.rej"
          fi

      - name: Commit result
        run: |
          cd merged
          find . -name "*.rej" -delete
          find . -name "*.orig" -delete
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "backport: OEM patches from cctv18 onto Google GKI ${{ inputs.google_branch }}"

      - name: Push
        if: inputs.dry_run != 'true'
        run: |
          cd merged
          # Pack objects before push to avoid "did not receive expected object" error
          git gc --aggressive --quiet
          git push -u origin "${{ inputs.target_branch }}" --force

      - name: Upload patches artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oem-patches
          path: patches/
          retention-days: 7

      - name: Upload rejects artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-rejects
          path: merged/**/*.rej
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "=== Summary ==="
          echo "Fork point:  ${{ env.FORK_SHA }}"
          echo "Google HEAD: ${{ env.GOOGLE_SHA }}"
          echo "cctv18:      ${{ env.CCTV18_SHA }}"
          echo "Rejects:     ${{ env.REJECT_COUNT }}"
