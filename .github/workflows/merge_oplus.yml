name: Merge OEM Overlay onto Google GKI

on:
  workflow_dispatch:
    inputs:
      google_branch:
        description: 'Google GKI branch'
        default: 'android15-6.6'
        required: true
      cctv18_branch:
        description: 'cctv18 OEM branch'
        default: 'oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89'
        required: true
      target_branch:
        description: 'Target branch in this repo'
        default: 'merge/android15-6.6-oplus'
        required: true
      dry_run:
        description: 'Dry run (no push)'
        type: boolean
        default: false

jobs:
  merge:
    name: Overlay OEM drivers onto GKI base
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Configure git
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global advice.detachedHead false

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: scripts_repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Google GKI base
        run: |
          git clone --depth=1 \
            -b "${{ inputs.google_branch }}" \
            https://android.googlesource.com/kernel/common \
            google_src
          echo "GOOGLE_SHA=$(git -C google_src rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Clone cctv18 OEM source
        run: |
          git clone --depth=1 \
            -b "${{ inputs.cctv18_branch }}" \
            https://github.com/cctv18/android_kernel_common_oneplus_sm8750 \
            cctv18_src
          echo "CCTV18_SHA=$(git -C cctv18_src rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Dump cctv18 structure
        run: |
          echo "=== cctv18 root ==="
          ls cctv18_src/
          echo "=== cctv18 drivers/ ==="
          ls cctv18_src/drivers/ || true
          echo "=== cctv18 drivers/vendor/ ==="
          ls cctv18_src/drivers/vendor/ 2>/dev/null || echo "(no drivers/vendor)"
          echo "=== cctv18 arch/arm64/configs/ ==="
          ls cctv18_src/arch/arm64/configs/ || true

      - name: Prepare merged repo
        run: |
          cp -a google_src merged
          cd merged
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b "${{ inputs.target_branch }}"

      - name: Copy OEM overlay
        run: |
          set -euo pipefail
          SRC="$(pwd)/cctv18_src"
          DST="$(pwd)/merged"
          GOOGLE="$(pwd)/google_src"
          PATTERNS="oplus oppo oneplus coloros"

          copy_dir() {
            local src_abs="$1"
            local rel="${src_abs#$SRC/}"
            local dst_parent="$DST/$(dirname "$rel")"
            mkdir -p "$dst_parent"
            cp -a "$src_abs" "$dst_parent/"
            echo "  copied: $rel"
          }

          # 1. Top-level OEM dirs (e.g. oplus/ at repo root)
          echo "=== Top-level ==="
          for d in "$SRC"/*/; do
            name=$(basename "$d")
            for pat in $PATTERNS; do
              if echo "$name" | grep -qi "$pat"; then
                echo "  top-level: $name"
                cp -a "$d" "$DST/"
                break
              fi
            done
          done

          # 2. drivers/ subtree — any dir with OEM name not present in google
          echo "=== drivers/ ==="
          find "$SRC/drivers" -mindepth 1 -maxdepth 6 -type d | sort | while read -r abs; do
            rel="${abs#$SRC/}"
            [[ -d "$GOOGLE/$rel" ]] && continue
            for pat in $PATTERNS; do
              if echo "$rel" | grep -qi "$pat"; then
                copy_dir "$abs"
                break
              fi
            done
          done

          # 3. sound/ subtree
          echo "=== sound/ ==="
          if [[ -d "$SRC/sound" ]]; then
            find "$SRC/sound" -mindepth 1 -maxdepth 6 -type d | sort | while read -r abs; do
              rel="${abs#$SRC/}"
              [[ -d "$GOOGLE/$rel" ]] && continue
              for pat in $PATTERNS; do
                if echo "$rel" | grep -qi "$pat"; then
                  copy_dir "$abs"
                  break
                fi
              done
            done
          fi

          # 4. arch/arm64/configs — OEM-named configs
          echo "=== arch configs ==="
          find "$SRC/arch" \( -name "*.config" -o -name "*defconfig*" \) | while read -r f; do
            rel="${f#$SRC/}"
            for pat in $PATTERNS sm8750; do
              if echo "$rel" | grep -qi "$pat"; then
                mkdir -p "$DST/$(dirname "$rel")"
                cp -a "$f" "$DST/$rel"
                echo "  config: $rel"
                break
              fi
            done
          done

          echo "=== Done copying OEM overlay ==="

      - name: Patch drivers/Makefile and Kconfig
        run: |
          DST="$(pwd)/merged"
          if [[ -f "$DST/drivers/Makefile" && -d "$DST/drivers/vendor/oplus" ]]; then
            if ! grep -q "vendor/oplus" "$DST/drivers/Makefile"; then
              printf '\n# OEM vendor drivers\nobj-$(CONFIG_OPLUS_DRIVERS)\t+= vendor/oplus/\n' >> "$DST/drivers/Makefile"
              echo "Patched drivers/Makefile"
            fi
          fi
          if [[ -f "$DST/drivers/Kconfig" && -f "$DST/drivers/vendor/oplus/Kconfig" ]]; then
            if ! grep -q "vendor/oplus" "$DST/drivers/Kconfig"; then
              printf '\nsource "drivers/vendor/oplus/Kconfig"\n' >> "$DST/drivers/Kconfig"
              echo "Patched drivers/Kconfig"
            fi
          fi

      - name: Commit overlay
        run: |
          cd merged
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — no OEM-specific paths found in cctv18."
            exit 0
          fi
          git commit -m "overlay: import OEM drivers from cctv18 onto Google GKI android15-6.6"

      - name: Push to target branch
        if: inputs.dry_run != 'true'
        run: |
          cd merged
          git push -u origin "${{ inputs.target_branch }}" --force
          echo "Pushed to ${{ inputs.target_branch }}"

      - name: Upload merged tree as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-kernel-tree
          path: merged/
          retention-days: 3
          if-no-files-found: warn
