name: Backport OEM Patches onto Google GKI

on:
  workflow_dispatch:
    inputs:
      google_branch:
        description: 'Google GKI branch'
        default: 'android15-6.6'
        required: true
      cctv18_branch:
        description: 'cctv18 OEM branch'
        default: 'oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89'
        required: true
      target_branch:
        description: 'Output branch in this repo'
        default: 'backport/android15-6.6-oplus'
        required: true
      dry_run:
        description: 'Dry run (no push)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backport:
    name: Backport OEM patches onto fresh GKI
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Configure git
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global advice.detachedHead false

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Google GKI (depth=1)
        run: |
          git clone --depth=1 \
            -b "${{ inputs.google_branch }}" \
            https://android.googlesource.com/kernel/common \
            google_src
          echo "GOOGLE_SHA=$(git -C google_src rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Clone cctv18 (depth=1)
        run: |
          git clone --depth=1 \
            -b "${{ inputs.cctv18_branch }}" \
            https://github.com/cctv18/android_kernel_common_oneplus_sm8750 \
            cctv18_src
          echo "CCTV18_SHA=$(git -C cctv18_src rev-parse --short HEAD)" >> $GITHUB_ENV

      # Find the exact Google commit that matches cctv18's base (6.6.89 tag)
      # We need google tree AT 6.6.89, not HEAD, for a clean diff
      - name: Checkout Google at fork point (6.6.89)
        run: |
          cd google_src
          # Fetch just the tag without full history
          git fetch --depth=1 origin \
            refs/tags/android15-6.6.89_r00:refs/tags/android15-6.6.89_r00 \
            2>/dev/null || true

          FORK_SHA=$(git log --format="%H %s" origin/${{ inputs.google_branch }} \
            2>/dev/null | grep -m1 "6\.6\.89" | awk '{print $1}' || true)

          # If we found it in shallow log
          if [[ -n "$FORK_SHA" ]]; then
            git fetch --depth=1 origin "$FORK_SHA" 2>/dev/null || true
            git checkout "$FORK_SHA" 2>/dev/null || true
            echo "Checked out fork point: $FORK_SHA"
          else
            echo "WARNING: Could not find 6.6.89 in shallow log, using HEAD as base"
            FORK_SHA=$(git rev-parse HEAD)
          fi
          echo "FORK_SHA=$FORK_SHA" >> $GITHUB_ENV

      # Diff subtree by subtree to avoid 380MB single-file segfault
      - name: Generate OEM patch (split by subtree)
        run: |
          GOOGLE="$(pwd)/google_src"
          CCTV18="$(pwd)/cctv18_src"
          mkdir -p patches

          # Top-level subtrees to diff separately
          SUBTREES=(
            arch
            block
            crypto
            drivers
            fs
            include
            init
            ipc
            kernel
            lib
            mm
            net
            scripts
            security
            sound
            tools
            virt
          )

          TOTAL_SIZE=0
          for tree in "${SUBTREES[@]}"; do
            if [[ -d "$CCTV18/$tree" ]]; then
              echo "Diffing $tree/ ..."
              git diff --no-index --binary \
                "$GOOGLE/$tree" "$CCTV18/$tree" \
                > "patches/${tree}.patch" 2>/dev/null || true
              SIZE=$(wc -c < "patches/${tree}.patch")
              TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
              echo "  $tree: $SIZE bytes"
            fi
          done

          # Root-level files (Makefile, Kconfig, etc.)
          echo "Diffing root files ..."
          for f in Makefile Kconfig MAINTAINERS; do
            if [[ -f "$CCTV18/$f" ]]; then
              git diff --no-index --binary \
                "$GOOGLE/$f" "$CCTV18/$f" \
                >> "patches/root.patch" 2>/dev/null || true
            fi
          done

          echo "Total patch size: $TOTAL_SIZE bytes"
          ls -lh patches/

      # Fix patch paths: --no-index produces full paths, strip to relative
      - name: Fix patch paths
        run: |
          for patch in patches/*.patch; do
            [[ -s "$patch" ]] || continue
            # Replace full paths with relative ones
            # e.g. "--- a/home/runner/.../google_src/drivers/..." -> "--- a/drivers/..."
            sed -i \
              -e "s|--- a/.*/google_src/|--- a/|g" \
              -e "s|+++ b/.*/cctv18_src/|+++ b/|g" \
              -e "s|--- a/.*/google_src$|--- a/|g" \
              -e "s|+++ b/.*/cctv18_src$|+++ b/|g" \
              "$patch"
          done

      # Prepare fresh Google HEAD as target
      - name: Prepare target tree (fresh Google HEAD)
        run: |
          cd google_src
          git fetch --depth=1 origin ${{ inputs.google_branch }}
          git checkout origin/${{ inputs.google_branch }}
          cd ..
          cp -a google_src merged
          cd merged
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout -b "${{ inputs.target_branch }}"

      # Apply each subtree patch independently
      - name: Apply patches subtree by subtree
        run: |
          cd merged
          TOTAL_REJECTS=0

          for patch in ../patches/*.patch; do
            [[ -s "$patch" ]] || continue
            name=$(basename "$patch")
            echo "Applying $name ..."

            git apply \
              --reject \
              --ignore-whitespace \
              --ignore-space-change \
              "$patch" 2>&1 | tail -5 || true

            REJECTS=$(find . -name "*.rej" | wc -l)
            echo "  rejects so far: $REJECTS"
            TOTAL_REJECTS=$REJECTS
          done

          echo "REJECT_COUNT=$TOTAL_REJECTS" >> $GITHUB_ENV
          echo "Total rejected hunks: $TOTAL_REJECTS"
          if [[ "$TOTAL_REJECTS" -gt 0 ]]; then
            echo "=== Rejected files ==="
            find . -name "*.rej"
          fi

      - name: Commit result
        run: |
          cd merged
          # Remove .rej and .orig files before committing
          find . -name "*.rej" -delete
          find . -name "*.orig" -delete
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "backport: OEM patches from cctv18 onto Google GKI ${{ inputs.google_branch }}"

      - name: Push
        if: inputs.dry_run != 'true'
        run: |
          cd merged
          git push -u origin "${{ inputs.target_branch }}" --force

      - name: Upload patches
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oem-patches
          path: patches/
          retention-days: 7

      - name: Upload rejects
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-rejects
          path: merged/**/*.rej
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "=== Summary ==="
          echo "Fork point:  ${{ env.FORK_SHA }}"
          echo "Google HEAD: ${{ env.GOOGLE_SHA }}"
          echo "cctv18:      ${{ env.CCTV18_SHA }}"
          echo "Rejects:     ${{ env.REJECT_COUNT }}"
